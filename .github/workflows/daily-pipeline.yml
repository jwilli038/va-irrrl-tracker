name: VA IRRRL Daily Rate Pipeline

on:
  schedule:
    # 9am EDT (UTC-4, Mar–Nov) = 13:00 UTC
    - cron: '0 13 * * 1-5'
    # 9am EST (UTC-5, Nov–Mar) = 14:00 UTC
    - cron: '0 14 * * 1-5'
  # Allow manual trigger from GitHub Actions tab (great for testing)
  workflow_dispatch:
    inputs:
      test_recipient:
        description: 'Override recipient email for test runs (leave blank for normal recipients)'
        required: false
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # Required to commit history.json back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run rate pipeline
        run: node src/index.js ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        env:
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          RECIPIENT_EMAILS:      ${{ inputs.test_recipient != '' && inputs.test_recipient || secrets.RECIPIENT_EMAILS }}
          RECIPIENT_EMAILS_TT:   ${{ inputs.test_recipient != '' && '' || secrets.RECIPIENT_EMAILS_TT }}

      - name: Commit updated rate history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/history.json; then
            echo "No history changes to commit."
          else
            git add data/history.json
            git commit -m "chore: rate history $(date -u +%Y-%m-%d)"
            git push
          fi
